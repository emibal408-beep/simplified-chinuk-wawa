name: Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Unsigned APK
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
          ./gradlew assembleDebug -x test -Pandroid.injected.signing.config.signingReady=false
        else
          gradle assembleDebug -x test -Pandroid.injected.signing.config.signingReady=false
        fi

    - name: Create Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Latest App Build"
        draft: false
        prerelease: false
        files: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Dummy Google Services Config
      run: |
        mkdir -p app
        echo '{
          "project_info": {
            "project_number": "123456789012",
            "project_id": "mock-project-id",
            "storage_bucket": "mock-project-id.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:123456789012:android:mockapp123456",
                "android_client_info": {
                  "package_name": "com.aistudio.chinukwawa.xyzabc"
                }
              },
              "api_key": [
                {
                  "current_key": "mock_AIzaSyMockKey_Here"
                }
              ],
              "services": {
                "appinvite_service": {
                  "status": 1
                }
              }
            }
          ],
          "configuration_version": "1"
        }' > app/google-services.json

    - name: Generate Debug Keystores
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        cp debug.keystore app/debug.keystore

    - name: Build with Gradle
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
          ./gradlew assembleDebug -x test -Pandroid.injected.signing.config.signingReady=false
        else
          gradle assembleDebug -x test -Pandroid.injected.signing.config.signingReady=false
        fi

    - name: Create Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Latest App Build"
        draft: false
        prerelease: false
        files: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

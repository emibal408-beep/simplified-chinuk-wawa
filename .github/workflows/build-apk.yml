name: Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Debug Keystore
      run: |
        mkdir -p app
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build with Gradle
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx2048m -Dkotlin.daemon.jvm.options=-Xmx2048m"
        else
          gradle assembleDebug -Dorg.gradle.jvmargs="-Xmx2048m -Dkotlin.daemon.jvm.options=-Xmx2048m"
        fi

    - name: Create Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Latest App Build"
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
